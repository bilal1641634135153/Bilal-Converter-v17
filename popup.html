<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; text-align: center; background: #121212; color: #fff; padding: 20px; width: 380px; }
        .container { background: #1e1e1e; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        input { padding: 12px; width: 300px; border-radius: 8px; border: none; font-size: 18px; text-align: center; background: #2d2d2d; color: white; margin-bottom: 15px; }
        #result { font-size: 24px; color: #00d1ff; margin-bottom: 15px; font-weight: bold; min-height: 40px; word-break: break-all; border: 1px dashed #333; padding: 10px; border-radius: 10px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background-color: #00d1ff; color: #121212; border: none; border-radius: 8px; font-weight: bold; transition: 0.3s; }
        button:hover { background-color: #00a8cc; }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="container">
        <h3>مصحح اخطائك</h3>
        <input type="text" id="inputBox" placeholder="اكتب هنا..." autofocus>
        <div id="result"></div>
        <button id="copyBtn">نسخ المخرجات</button>
    </div>
    <script src="popup.js"></script>
</body>
</html>
